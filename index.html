<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    #check-status { background: #2ecc71; color: white; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; border-radius: 8px; border: 1px solid #00ffcc; min-height: 40px; font-size: 12px; text-align: left; word-break: break-all; }
  </style>
</head>
<body>
<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Login richiesto</div>
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <button id="check-status" disabled>SBLOCCA PAGAMENTI</button>
  <div id="status">In attesa...</div>
</div>

<script>
const Pi = window.Pi;
let userToken = null;
let currentUser = null;

try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) { console.error(e); }

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");

function setStatus(msg) { statusEl.innerText = "SISTEMA: " + msg; }

async function callApi(endpoint, method = "POST", body = null) {
  const options = {
    method: method,
    headers: { 
      "Content-Type": "application/json",
      "Authorization-User": userToken 
    }
  };
  if (body) options.body = JSON.stringify(body);
  const res = await fetch("/api/" + endpoint, options);
  return await res.json();
}

document.getElementById("login").onclick = async () => {
  try {
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
       callApi("complete", "POST", { paymentId: payment.identifier, txid: payment.transaction.txid });
    });
    currentUser = auth.user;
    userToken = auth.accessToken; 
    userEl.innerText = "Ciao, " + currentUser.username;
    document.getElementById("login").style.display = "none";
    document.getElementById("buy").disabled = false;
    document.getElementById("claim-reward").disabled = false;
    document.getElementById("check-status").disabled = false;
    setStatus("Login effettuato! ✅");
  } catch (e) { setStatus("Errore Login: " + e.message); }
};

document.getElementById("claim-reward").onclick = async () => {
  setStatus("Richiesta premio...");
  const res = await callApi("claim", "POST", { uid: currentUser.uid });
  setStatus("Risposta: " + JSON.stringify(res));
};

document.getElementById("check-status").onclick = async () => {
  setStatus("Controllo pagamenti sospesi...");
  const res = await callApi("incomplete", "GET");
  setStatus("Risposta Pi: " + JSON.stringify(res));
};
</script>
</body>
</html>
