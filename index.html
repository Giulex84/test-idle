<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    #login { background: #ff4757; color: white; }
    #check-status { background: #2ecc71; color: white; width: 100%; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; border-radius: 8px; border: 1px solid #00ffcc; font-size: 11px; text-align: left; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>IDLE REALM</h1>
    <div id="user-info">Ciao, Giulex84</div>
    <button id="login">COLLEGA PI WALLET</button>
    <button id="check-status" disabled>SBLOCCA PAGAMENTI SOSPESI</button>
    <div id="status">In attesa...</div>
  </div>

<script>
const Pi = window.Pi;
let userToken = null;
const statusEl = document.getElementById("status");

try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) {}

document.getElementById("login").onclick = async () => {
  try {
    const auth = await Pi.authenticate(["username", "payments"], (p) => {});
    userToken = auth.accessToken; // Il token "ottenuto" che vedi nello screenshot
    localStorage.setItem("pi_token", userToken);
    document.getElementById("check-status").disabled = false;
    statusEl.innerText = "SISTEMA: Login effettuato! Token ottenuto ✅";
  } catch (e) { statusEl.innerText = "Errore: " + e.message; }
};

document.getElementById("check-status").onclick = async () => {
  const token = userToken || localStorage.getItem("pi_token");
  statusEl.innerText = "SISTEMA: Invio richiesta di sblocco...";
  
  // Usiamo l'URL per passare il token, saltando i filtri di Cloudflare
  const res = await fetch("/api/incomplete?token=" + token);
  const data = await res.json();
  statusEl.innerText = "SISTEMA: Risposta Pi: " + JSON.stringify(data);
};
</script>
</body>
</html>
