<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; }
    h1 { color: #f1c40f; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; font-family: monospace; font-size: 13px; border-radius: 8px; border: 1px solid #00ffcc; min-height: 20px; }
    #user-info { margin-bottom: 20px; color: #ffda79; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Effettua il login per iniziare</div>
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <div id="status">In attesa di azione...</div>
</div>

<script>
const Pi = window.Pi;
let currentUser = null;
let userToken = null;

try {
    Pi.init({ version: "2.0", sandbox: false });
} catch(e) {
    console.error("SDK Init Error:", e);
}

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");
const loginBtn = document.getElementById("login");
const buyBtn = document.getElementById("buy");
const claimBtn = document.getElementById("claim-reward");

function setStatus(msg) { statusEl.innerText = "Stato: " + msg; }

async function postJson(url, body) {
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization-User": userToken // Invia il token per sbloccare il backend
      },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (e) {
    return { error: "Errore di connessione al server" };
  }
}

loginBtn.onclick = async () => {
  try {
    setStatus("Autenticazione...");
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
       postJson("/api/complete", { paymentId: payment.identifier, txid: payment.transaction.txid });
    });

    currentUser = auth.user;
    userToken = auth.accessToken; // Salviamo il token di sessione
    
    await postJson("/api/auth", { user: currentUser });

    userEl.innerText = "Ciao, " + currentUser.username;
    loginBtn.style.display = "none";
    buyBtn.disabled = false;
    claimBtn.disabled = false;
    setStatus("Login effettuato! ✅");
  } catch (e) {
    setStatus("Errore Login: " + e.message);
  }
};

buyBtn.onclick = () => {
  setStatus("Preparazione acquisto...");
  Pi.createPayment({
    amount: 0.01,
    memo: "Acquisto Item Idle Realm",
    metadata: { item: "test_item_01" }
  }, {
    onReadyForServerApproval: (id) => postJson("/api/approve", { paymentId: id }),
    onReadyForServerCompletion: (id, txid) => {
        postJson("/api/complete", { paymentId: id, txid: txid });
        setStatus("Acquisto completato! ✅");
    },
    onCancel: () => setStatus("Pagamento annullato"),
    onError: (err) => setStatus("Errore: " + err.message)
  });
};

claimBtn.onclick = async () => {
  if (!currentUser) return;
  setStatus("Richiesta premio inviata...");
  claimBtn.disabled = true;
  const res = await postJson("/api/claim", { uid: currentUser.uid });

  if (res.success) { 
    setStatus("Premio inviato! Controlla il wallet ✅");
  } else {
    setStatus("Errore: " + (res.error || res.message));
    claimBtn.disabled = false;
  }
};
</script>
</body>
</html>
