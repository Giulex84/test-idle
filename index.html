<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h1 { color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    #user-info { margin-bottom: 20px; color: #ffda79; font-weight: bold; min-height: 20px; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    #check-status { background: #2ecc71; color: white; font-size: 11px; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; font-family: monospace; font-size: 12px; border-radius: 8px; border: 1px solid #00ffcc; min-height: 40px; word-break: break-all; text-align: left; }
  </style>
</head>
<body>

<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Login richiesto per iniziare</div>
  
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <button id="check-status" disabled>SBLOCCA PAGAMENTI SOSPESI</button>
  
  <div id="status">In attesa di azione...</div>
</div>

<script>
const Pi = window.Pi;
let userToken = null;
let currentUser = null;

// Inizializzazione SDK Pi Network
try { 
    Pi.init({ version: "2.0", sandbox: false }); 
} catch(e) { 
    console.error("Errore SDK:", e); 
}

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");

function setStatus(msg) { 
    statusEl.innerText = "SISTEMA: " + msg; 
}

// 1. GESTIONE LOGIN (Necessario per ottenere l'AccessToken)
document.getElementById("login").onclick = async () => {
  try {
    setStatus("Autenticazione in corso...");
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (p) => {
       // Callback per pagamenti interrotti lato utente
       fetch("/api/complete", {
         method: "POST",
         headers: { "Content-Type": "application/json", "x-pi-token": userToken },
         body: JSON.stringify({ paymentId: p.identifier, txid: p.transaction.txid })
       });
    });

    currentUser = auth.user;
    userToken = auth.accessToken; // Salviamo il token fondamentale
    
    userEl.innerText = "Benvenuto, " + currentUser.username;
    document.getElementById("login").style.display = "none";
    document.getElementById("buy").disabled = false;
    document.getElementById("claim-reward").disabled = false;
    document.getElementById("check-status").disabled = false;
    setStatus("Login effettuato! ✅");
  } catch (e) {
    setStatus("Errore Login: " + e.message);
  }
};

// 2. ACQUISTO (User-to-App)
document.getElementById("buy").onclick = () => {
  setStatus("Apertura Wallet Pi...");
  Pi.createPayment({
    amount: 0.01,
    memo: "Acquisto test Idle Realm",
    metadata: { item: "test_item_01" }
  }, {
    onReadyForServerApproval: (id) => {
      return fetch("/api/approve", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-pi-token": userToken },
        body: JSON.stringify({ paymentId: id })
      }).then(res => res.json());
    },
    onReadyForServerCompletion: (id, txid) => {
      return fetch("/api/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-pi-token": userToken },
        body: JSON.stringify({ paymentId: id, txid: txid })
      }).then(res => res.json()).then(() => setStatus("Acquisto completato! ✅"));
    },
    onCancel: () => setStatus("Pagamento annullato."),
    onError: (err) => setStatus("Errore: " + err.message)
  });
};

// 3. PREMIO (App-to-User) - Qui nasceva l'errore "Ongoing"
document.getElementById("claim-reward").onclick = async () => {
  setStatus("Richiesta premio in corso...");
  try {
    const res = await fetch("/api/claim", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-pi-token": userToken },
      body: JSON.stringify({ uid: currentUser.uid })
    });
    const data = await res.json();
    setStatus("Risposta: " + JSON.stringify(data));
  } catch (e) {
    setStatus("Errore durante la richiesta premio.");
  }
};

// 4. SBLOCCA (La funzione per pulire la coda dei pagamenti)
document.getElementById("check-status").onclick = async () => {
  setStatus("Controllo pagamenti incompleti...");
  
  if (!userToken) {
    setStatus("Effettua prima il login!");
    return;
  }

  try {
    const res = await fetch("/api/incomplete", {
        method: "GET",
        headers: { 
          "x-pi-token": userToken 
        }
    });
    const data = await res.json();
    
    if (data.error) {
        setStatus("Errore Pi: " + data.error_message);
    } else if (Array.isArray(data) && data.length === 0) {
        setStatus("Coda pulita! Nessun pagamento sospeso. ✅");
    } else {
        setStatus("Trovato pagamento sospeso: " + JSON.stringify(data));
        // Il server di Pi proverà a risolverlo automaticamente ora che hai chiamato questo endpoint
    }
  } catch (e) {
    setStatus("Errore connessione al server.");
  }
};
</script>
</body>
</html>
