<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h1 { color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; }
    #user-info { margin-bottom: 20px; color: #ffda79; font-weight: bold; min-height: 20px; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    #check-status { background: #2ecc71; color: white; font-size: 11px; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; font-family: monospace; font-size: 12px; border-radius: 8px; border: 1px solid #00ffcc; min-height: 40px; word-break: break-all; text-align: left; }
  </style>
</head>
<body>

<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Login richiesto</div>
  
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <button id="check-status" disabled>SBLOCCA PAGAMENTI SOSPESI</button>
  
  <div id="status">In attesa di azione...</div>
</div>

<script>
const Pi = window.Pi;
let userToken = null;
let currentUser = null;

// Inizializzazione SDK
try { 
    Pi.init({ version: "2.0", sandbox: false }); 
} catch(e) { 
    console.error("Errore SDK:", e); 
}

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");

function setStatus(msg) { 
    statusEl.innerText = "SISTEMA: " + msg; 
}

// Funzione universale per chiamare le API Cloudflare
async function callApi(endpoint, method = "POST", body = null) {
  const options = {
    method: method,
    headers: { 
      "Content-Type": "application/json",
      "x-access-token": userToken // Header rinominato per massima compatibilità
    }
  };
  if (body) options.body = JSON.stringify(body);

  try {
    const res = await fetch("/api/" + endpoint, options);
    return await res.json();
  } catch (e) {
    return { error: "Errore di connessione al server" };
  }
}

// 1. GESTIONE LOGIN
document.getElementById("login").onclick = async () => {
  try {
    setStatus("Autenticazione in corso...");
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (p) => {
       callApi("complete", "POST", { paymentId: p.identifier, txid: p.transaction.txid });
    });

    currentUser = auth.user;
    userToken = auth.accessToken; 
    
    userEl.innerText = "Ciao, " + currentUser.username;
    document.getElementById("login").style.display = "none";
    document.getElementById("buy").disabled = false;
    document.getElementById("claim-reward").disabled = false;
    document.getElementById("check-status").disabled = false;
    setStatus("Login effettuato! ✅");
  } catch (e) {
    setStatus("Errore Login: " + e.message);
  }
};

// 2. ACQUISTO (USER-TO-APP)
document.getElementById("buy").onclick = () => {
  setStatus("Apertura Wallet Pi...");
  Pi.createPayment({
    amount: 0.01,
    memo: "Test acquisto Idle Realm",
    metadata: { item: "test_01" }
  }, {
    onReadyForServerApproval: (id) => callApi("approve", "POST", { paymentId: id }),
    onReadyForServerCompletion: (id, txid) => {
        callApi("complete", "POST", { paymentId: id, txid: txid });
        setStatus("Acquisto completato con successo! ✅");
    },
    onCancel: () => setStatus("Pagamento annullato."),
    onError: (err) => setStatus("Errore: " + err.message)
  });
};

// 3. PREMIO (APP-TO-USER)
document.getElementById("claim-reward").onclick = async () => {
  setStatus("Richiesta premio (A2U)...");
  document.getElementById("claim-reward").disabled = true;

  const res = await callApi("claim", "POST", { uid: currentUser.uid });

  if (res.success) { 
    setStatus("Premio inviato! Controlla il wallet ✅");
  } else {
    setStatus("Risposta: " + JSON.stringify(res));
    document.getElementById("claim-reward").disabled = false;
  }
};

// 4. SBLOCCO (INCOMPLETE)
document.getElementById("check-status").onclick = async () => {
  setStatus("Interrogazione pagamenti incompleti...");
  
  // Utilizziamo fetch diretto per assicurarci che l'header x-access-token sia presente
  try {
      const res = await fetch("/api/incomplete", {
          method: "GET",
          headers: { "x-access-token": userToken }
      });
      const data = await res.json();
      setStatus("Risposta Pi: " + JSON.stringify(data));
  } catch (e) {
      setStatus("Errore durante il controllo: " + e.message);
  }
};
</script>
</body>
</html>
