<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Testing Idle - Testnet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    Pi.init({ version: "2.0", sandbox: true });
  </script>
  <style>
    body { margin: 0; min-height: 100vh; font-family: sans-serif; background: #0d0d14; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .app { width: 90%; max-width: 420px; background: #1a1a2e; padding: 30px; border-radius: 20px; border: 1px solid #4a4e69; text-align: center; }
    button { width: 100%; border-radius: 12px; padding: 14px; cursor: pointer; font-weight: 600; margin-top: 15px; border: none; transition: 0.2s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #login { background: #6c5ce7; color: #fff; }
    #u2a { background: #e17055; color: #fff; }
    #a2u { background: #00b894; color: #fff; }
    #status { margin-top: 20px; padding: 15px; border-radius: 10px; background: #000; font-family: monospace; font-size: 0.85rem; color: #55efc4; white-space: pre-wrap; word-break: break-all; border: 1px solid #333; min-height: 50px; }
    footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.7; }
  </style>
</head>
<body>
  <main class="app">
    <h2>Testing Idle</h2>
    <p>Compliance Mode: Testnet</p>
    <button id="login">Accedi con Pi Browser</button>
    <div id="payment-section" style="display:none;">
      <button id="u2a">Invia 0.1 Test-Pi (U2A)</button>
      <button id="a2u">Ricevi 1.0 Test-Pi (A2U)</button>
    </div>
    <div id="status">Stato: In attesa di login...</div>
  </main>

  <script>
    const loginBtn = document.getElementById("login");
    const paymentSection = document.getElementById("payment-section");
    const u2aBtn = document.getElementById("u2a");
    const a2uBtn = document.getElementById("a2u");
    const statusEl = document.getElementById("status");
    let piUser = null;

    loginBtn.onclick = async () => {
      try {
        statusEl.textContent = "Autenticazione...";
        const auth = await Pi.authenticate(["username", "payments", "wallet_address"]);
        piUser = auth.user;
        statusEl.textContent = `Benvenuto, ${piUser.username}!`;
        loginBtn.style.display = "none";
        paymentSection.style.display = "block";
      } catch (err) {
        statusEl.textContent = "Errore Login: " + err.message;
      }
    };

    u2aBtn.onclick = async () => {
      statusEl.textContent = "Verifica flussi pendenti...";
      try {
        await Pi.createPayment({
          amount: 0.1,
          memo: "Testing Idle U2A Payment",
          metadata: { type: "u2a_testing_idle" },
        }, {
          onReadyForServerApproval: async (paymentId) => {
            statusEl.textContent = "Approvazione server in corso...";
            const res = await fetch("/api/pi-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "approve", paymentId })
            });
            if (!res.ok) {
                const errorData = await res.json();
                if(errorData.error === "ongoing_payment_found") {
                    statusEl.textContent = "Blocco rilevato e rimosso. Clicca di nuovo.";
                } else {
                    throw new Error("Errore approvazione");
                }
            }
          },
          onReadyForServerCompletion: async (paymentId, txid) => {
            statusEl.textContent = "Completamento in corso...";
            await fetch("/api/pi-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "complete", paymentId, txid })
            });
            statusEl.textContent = "U2A Successo! ✅";
          },
          onCancel: (paymentId) => { statusEl.textContent = "Pagamento annullato."; },
          onError: (error) => { statusEl.textContent = "Errore: " + error.message; },
        });
      } catch (err) {
        statusEl.textContent = "Errore critico: " + err.message;
      }
    };

    a2uBtn.onclick = async () => {
      statusEl.textContent = "Richiesta A2U (App -> Utente)...";
      try {
        const res = await fetch("/api/a2u", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid: piUser.uid, amount: 1 })
        });
        const data = await res.json();
        if (res.ok) {
            statusEl.textContent = `A2U Successo! ✅\nTXID: ${data.txid.substring(0,15)}...`;
        } else {
            statusEl.textContent = "Errore A2U: " + data.error;
        }
      } catch (err) { statusEl.textContent = "Errore di rete."; }
    };
  </script>
</body>
</html>
