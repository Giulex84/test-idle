<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; }
    button { padding: 15px; margin: 10px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    button:disabled { opacity: 0.3; }
    #status { margin-top: 20px; padding: 10px; background: #222; color: #00ffcc; font-family: monospace; font-size: 13px; }
    #user-info { margin-bottom: 15px; color: #ffda79; }
  </style>
</head>
<body>
<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Effettua il login</div>
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <div id="status">In attesa...</div>
</div>

<script>
const Pi = window.Pi;
// Inizializzazione immediata
try {
    Pi.init({ version: "2.0", sandbox: true });
} catch(e) {
    console.error("Errore init:", e);
}

let currentUser = null;

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");
const loginBtn = document.getElementById("login");
const buyBtn = document.getElementById("buy");
const claimBtn = document.getElementById("claim-reward");

function setStatus(msg) { statusEl.innerText = "Stato: " + msg; }

async function postJson(url, body) {
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

loginBtn.onclick = async () => {
  try {
    setStatus("Autenticazione...");
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
       postJson("/api/complete", { paymentId: payment.identifier, txid: payment.transaction.txid });
    });

    currentUser = auth.user;
    // Chiamata alla tua function auth.js (quella senza database)
    await postJson("/api/auth", { user: currentUser });

    userEl.innerText = "Ciao, " + currentUser.username;
    loginBtn.style.display = "none";
    buyBtn.disabled = false;
    claimBtn.disabled = false;
    setStatus("Login OK");
  } catch (e) {
    setStatus("Errore: " + e.message);
  }
};

buyBtn.onclick = () => {
  Pi.createPayment({
    amount: 0.01,
    memo: "Test Purchase",
    metadata: { item: "test_01" }
  }, {
    onReadyForServerApproval: (id) => postJson("/api/approve", { paymentId: id }),
    onReadyForServerCompletion: (id, txid) => {
        postJson("/api/complete", { paymentId: id, txid: txid });
        setStatus("Acquisto completato! ✅");
    },
    onCancel: () => setStatus("Annullato"),
    onError: (err) => setStatus("Errore: " + err.message)
  });
};

claimBtn.onclick = async () => {
  if (!currentUser) return;
  setStatus("Invio premio...");
  // Chiamata alla tua function claim.js
  const res = await postJson("/api/claim", { uid: currentUser.uid });
  if (res.ok) setStatus("Premio inviato! ✅");
  else setStatus("Errore: " + (res.data?.error || "Riprova"));
};
</script>
</body>
</html>
