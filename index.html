<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Realm - Pi Network Mainnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #333; }
        h1 { color: #e67e22; margin-bottom: 5px; }
        p { color: #bbb; margin-bottom: 25px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        
        #login { background: #e67e22; color: white; }
        #login:hover { background: #d35400; }
        
        #u2a { background: #3498db; color: white; }
        #u2a:hover { background: #2980b9; }
        
        #a2u { background: #9b59b6; color: white; }
        #a2u:hover { background: #8e44ad; }
        
        #unlock { background: #27ae60; color: white; border: 2px solid transparent; }
        #unlock:hover { background: #2ecc71; }
        
        button:disabled { background: #444 !important; color: #777; cursor: not-allowed; transform: none; }
        #status { margin-top: 20px; padding: 15px; background: #2c3e50; border-radius: 10px; font-size: 0.85em; color: #ecf0f1; word-break: break-all; min-height: 50px; }
        .user-info { font-weight: bold; color: #f1c40f; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Idle Realm</h1>
    <p>Pi Network Ecosystem App</p>
    
    <div id="user-display" class="user-info">Effettua il login per iniziare</div>
    
    <button id="login">COLLEGA PI WALLET</button>
    <button id="u2a" disabled>ACQUISTA ITEM (U2A - 0.01 Pi)</button>
    <button id="a2u" disabled>RICEVI PREMIO (A2U - 0.01 Pi)</button>
    <button id="unlock" disabled>SBLOCCA PAGAMENTI SOSPESI</button>

    <div id="status">Stato: In attesa di autenticazione...</div>
</div>

<script>
    const Pi = window.Pi;
    let currentUser = null;

    // Inizializzazione SDK - sandbox: false per Mainnet
    try { 
        Pi.init({ version: "2.0", sandbox: false }); 
    } catch(e) {
        console.error("Errore inizializzazione SDK:", e);
    }

    const updateStatus = (msg) => {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Stato: " + msg;
        console.log(msg);
    };

    // --- LOGICA AUTENTICAZIONE ---
    document.getElementById('login').onclick = async () => {
        try {
            updateStatus("Connessione al Wallet in corso...");
            const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
                // Questo callback intercetta pagamenti incompleti DURANTE il login
                updateStatus("Rilevato pagamento incompleto nel login. Tentativo di chiusura...");
                handlePaymentCompletion(payment.identifier, payment.transaction.txid);
            });

            currentUser = auth.user;
            document.getElementById('user-display').innerText = "Account: " + auth.user.username;
            
            // Gestione UI
            document.getElementById('login').style.display = 'none';
            document.getElementById('u2a').disabled = false;
            document.getElementById('a2u').disabled = false;
            document.getElementById('unlock').disabled = false;
            
            updateStatus("Login completato con successo! ✅");
        } catch (err) {
            updateStatus("Errore Login: " + err.message);
        }
    };

    // --- USER TO APP (U2A) ---
    document.getElementById('u2a').onclick = () => {
        Pi.createPayment({
            amount: 0.01,
            memo: "Acquisto In-Game Idle Realm",
            metadata: { item: "spada_leggendaria", type: "u2a_purchase" }
        }, {
            onReadyForServerApproval: async (paymentId) => {
                updateStatus("Approvazione pagamento lato server...");
                await fetch("/api/approve", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ paymentId })
                });
            },
            onReadyForServerCompletion: async (paymentId, txid) => {
                updateStatus("Finalizzazione pagamento...");
                await handlePaymentCompletion(paymentId, txid);
            },
            onCancel: () => updateStatus("Pagamento annullato dall'utente."),
            onError: (err) => updateStatus("Errore pagamento: " + err.message)
        });
    };

    // --- APP TO USER (A2U) ---
    document.getElementById('a2u').onclick = async () => {
        updateStatus("Richiesta premio A2U al server...");
        try {
            // Nota: Chiamata pulita senza token utente come richiesto dai moderatori
            const res = await fetch("/api/claim", { method: "POST" });
            const data = await res.json();
            
            if (data.identifier) {
                updateStatus("Premio creato! ID: " + data.identifier + ". Ora attendi la conferma.");
            } else {
                updateStatus("Risposta Server: " + JSON.stringify(data));
            }
        } catch (e) {
            updateStatus("Errore durante la richiesta premio.");
        }
    };

    // --- SBLOCCA SOSPESI (Incomplete) ---
    document.getElementById('unlock').onclick = async () => {
        updateStatus("Verifica pagamenti bloccati nel database Pi...");
        try {
            const res = await fetch("/api/incomplete", { method: "POST" });
            const data = await res.json();
            
            if (data.incomplete_payments && data.incomplete_payments.length > 0) {
                const p = data.incomplete_payments[0]; // Prendiamo il primo bloccato
                const pId = p.identifier;
                const txid = p.transaction ? p.transaction.txid : null;
                
                updateStatus("Trovato bloccato: " + pId + ". Sblocco in corso...");
                await handlePaymentCompletion(pId, txid);
                updateStatus("Sblocco completato per: " + pId);
            } else {
                updateStatus("Ottimo! Nessun pagamento bloccato trovato.");
            }
        } catch (e) {
            updateStatus("Errore controllo sospesi: " + e.message);
        }
    };

    // --- FUNZIONE COMUNE DI COMPLETAMENTO ---
    async function handlePaymentCompletion(paymentId, txid) {
        try {
            const response = await fetch("/api/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ paymentId, txid })
            });
            const result = await response.json();
            updateStatus("Operazione conclusa con successo.");
            return result;
        } catch (err) {
            updateStatus("Errore nel completamento: " + err.message);
        }
    }
</script>

</body>
</html>
