<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giulex Hub - Vercel</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: true });</script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn { padding: 15px; margin: 10px; width: 85%; max-width: 300px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; display: block; margin-left: auto; margin-right: auto; }
        #status { background: #161b22; padding: 15px; border-radius: 8px; margin: 20px auto; border: 1px solid #30363d; max-width: 350px; font-size: 0.9em; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #8b949e; }
        .footer a { color: #58a6ff; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <h2>Giulex Hub Test</h2>
    <div id="user-display" style="margin-bottom: 10px; color: #58a6ff;"></div>
    <button id="login" class="btn" style="background: #1f6feb;">ACCEDI CON PI</button>
    
    <div id="controls" style="display:none;">
        <button id="u2a" class="btn" style="background: #f78166;">PAGA 0.1 Pi (U2A)</button>
        <button id="a2u" class="btn" style="background: #238636;">RICEVI 1.0 Pi (A2U)</button>
    </div>
    <div id="status">Stato: In attesa di login...</div>

    <div class="footer">
        <a href="/privacy.html">Privacy</a> | <a href="/terms.html">Terms</a>
    </div>

    <script>
        const status = document.getElementById("status");
        let currentUser = null;

        document.getElementById("login").onclick = async () => {
            try {
                // AGGIUNTO 'wallet_address' PER EVITARE MISSING_SCOPE
                const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (p) => {});
                currentUser = auth.user;
                document.getElementById("user-display").innerText = "Utente: " + currentUser.username;
                document.getElementById("controls").style.display = "block";
                document.getElementById("login").style.display = "none";
                status.innerText = "Login OK! ✅";
            } catch (e) { status.innerText = "Errore login: " + e.message; }
        };

        document.getElementById("u2a").onclick = async () => {
            try {
                await Pi.createPayment({ amount: 0.1, memo: "U2A Test", metadata: { s: "u" } }, {
                    onReadyForServerApproval: (id) => fetch("/api/pi-payment", {
                        method: "POST", headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ action: "approve", paymentId: id })
                    }),
                    onReadyForServerCompletion: (id, tx) => fetch("/api/pi-payment", {
                        method: "POST", headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ action: "complete", paymentId: id, txid: tx })
                    }),
                    onCancel: () => status.innerText = "Annullato.",
                    onError: (e) => status.innerText = "Errore: " + e.message
                });
            } catch (e) { status.innerText = "Errore U2A."; }
        };

        document.getElementById("a2u").onclick = async () => {
            status.innerText = "Elaborazione A2U...";
            try {
                const res = await fetch("/api/a2u", {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ uid: currentUser.uid, amount: 1 })
                });
                const data = await res.json();
                status.innerText = res.ok ? "Ricevuto! ✅" : "Errore: " + (data.error || "A2U Fallito");
            } catch (e) { status.innerText = "Errore rete A2U."; }
        };
    </script>
</body>
</html>
