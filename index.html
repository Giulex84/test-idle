<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Realm - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h1 { color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; }
    #user-info { margin-bottom: 20px; color: #ffda79; font-weight: bold; min-height: 20px; }
    button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
    #login { background: #ff4757; color: white; }
    #buy { background: #5a6cff; color: white; }
    #claim-reward { background: #f1c40f; color: black; }
    #check-status { background: #2ecc71; color: white; font-size: 11px; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 15px; background: #000; color: #00ffcc; font-family: monospace; font-size: 12px; border-radius: 8px; border: 1px solid #00ffcc; min-height: 40px; word-break: break-all; text-align: left; }
  </style>
</head>
<body>

<div class="container">
  <h1>Idle Realm</h1>
  <div id="user-info">Login richiesto</div>
  
  <button id="login">COLLEGA PI WALLET</button>
  <button id="buy" disabled>ACQUISTA ITEM (0.01 π)</button>
  <button id="claim-reward" disabled>RICEVI PREMIO (A2U)</button>
  <button id="check-status" disabled>SBLOCCA PAGAMENTI SOSPESI</button>
  
  <div id="status">In attesa...</div>
</div>

<script>
const Pi = window.Pi;
let userToken = null;

try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) { console.error(e); }

const statusEl = document.getElementById("status");
const userEl = document.getElementById("user-info");

function setStatus(msg) { statusEl.innerText = "SISTEMA: " + msg; }

// --- 1. LOGIN ---
document.getElementById("login").onclick = async () => {
  try {
    setStatus("Autenticazione...");
    const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (p) => {
       // Callback automatica per pagamenti interrotti
       fetch("/api/complete?token=" + userToken, {
         method: "POST",
         headers: { "Content-Type": "application/json" },
         body: JSON.stringify({ paymentId: p.identifier, txid: p.transaction.txid })
       });
    });

    userToken = auth.accessToken; 
    // Salvataggio di emergenza nel browser
    localStorage.setItem("pi_token", userToken); 
    
    userEl.innerText = "Ciao, " + auth.user.username;
    document.getElementById("login").style.display = "none";
    document.getElementById("buy").disabled = false;
    document.getElementById("claim-reward").disabled = false;
    document.getElementById("check-status").disabled = false;
    setStatus("Login effettuato! Token ottenuto ✅");
  } catch (e) { setStatus("Errore Login: " + e.message); }
};

// --- 2. SBLOCCA (L'endpoint critico) ---
document.getElementById("check-status").onclick = async () => {
  const token = userToken || localStorage.getItem("pi_token");
  setStatus("Controllo sospesi...");
  
  if (!token) { setStatus("Errore: Rifai il Login!"); return; }

  try {
    // Passiamo il token nell'URL così Cloudflare non lo tocca
    const res = await fetch("/api/incomplete?token=" + token);
    const data = await res.json();
    setStatus("Risposta Pi: " + JSON.stringify(data));
  } catch (e) { setStatus("Errore connessione."); }
};

// --- 3. PREMIO ---
document.getElementById("claim-reward").onclick = async () => {
  const token = userToken || localStorage.getItem("pi_token");
  setStatus("Richiesta premio...");
  try {
    const res = await fetch("/api/claim?token=" + token, {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });
    setStatus("Risposta: " + JSON.stringify(await res.json()));
  } catch (e) { setStatus("Errore richiesta."); }
};
</script>
</body>
</html>
