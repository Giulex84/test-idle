<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Realm - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #login { background: #e67e22; color: white; }
        #u2a { background: #3498db; color: white; } /* User to App */
        #a2u { background: #9b59b6; color: white; } /* App to User */
        #unlock { background: #2ecc71; color: white; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.9em; color: #bbb; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>Idle Realm</h1>
    <p id="user-display">Effettua il login per iniziare</p>
    
    <button id="login">COLLEGA PI WALLET</button>
    <button id="u2a" disabled>ACQUISTA ITEM (U2A)</button>
    <button id="a2u" disabled>RICEVI PREMIO (A2U)</button>
    <button id="unlock" disabled>SBLOCCA SOSPESI</button>

    <div id="status">Stato: In attesa di login...</div>
</div>

<script>
    const Pi = window.Pi;
    let accessToken = null;

    try { Pi.init({ version: "2.0", sandbox: false }); } catch(e) {}

    const updateStatus = (msg) => document.getElementById('status').innerText = "Stato: " + msg;

    // --- LOGICA AUTH ---
    document.getElementById('login').onclick = async () => {
        try {
            updateStatus("Autenticazione in corso...");
            const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
                // Callback per pagamenti incompleti trovati durante il login
                fetch("/api/complete?token=" + accessToken, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                });
            });

            accessToken = auth.accessToken;
            document.getElementById('user-display').innerText = "Benvenuto, " + auth.user.username;
            
            // Abilita tutti i bottoni
            document.getElementById('login').style.display = 'none';
            document.getElementById('u2a').disabled = false;
            document.getElementById('a2u').disabled = false;
            document.getElementById('unlock').disabled = false;
            
            updateStatus("Login effettuato! ✅");
        } catch (err) {
            updateStatus("Errore Login: " + err.message);
        }
    };

    // --- USER TO APP (L'utente paga l'app) ---
    document.getElementById('u2a').onclick = () => {
        Pi.createPayment({
            amount: 0.01,
            memo: "Acquisto In-Game",
            metadata: { item: "spada_leggendaria" }
        }, {
            onReadyForServerApproval: (paymentId) => {
                fetch("/api/approve?token=" + accessToken, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ paymentId })
                });
            },
            onReadyForServerCompletion: (paymentId, txid) => {
                fetch("/api/complete?token=" + accessToken, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ paymentId, txid })
                });
            },
            onCancel: () => updateStatus("Pagamento annullato."),
            onError: (err) => updateStatus("Errore: " + err.message)
        });
    };

    // --- APP TO USER (L'app paga l'utente) ---
    document.getElementById('a2u').onclick = async () => {
        updateStatus("Richiesta premio A2U...");
        try {
            const res = await fetch("/api/claim?token=" + accessToken, { method: "POST" });
            const data = await res.json();
            updateStatus("Risposta: " + JSON.stringify(data));
        } catch (e) {
            updateStatus("Errore invio premio.");
        }
    };

    // --- SBLOCCO SOSPESI ---
    document.getElementById('unlock').onclick = async () => {
        updateStatus("Verifica pagamenti incompleti...");
        try {
            const res = await fetch("/api/incomplete?token=" + accessToken);
            const data = await res.json();
            updateStatus("Incompleti: " + JSON.stringify(data));
        } catch (e) {
            updateStatus("Errore controllo sospesi.");
        }
    };
</script>

</body>
</html>
